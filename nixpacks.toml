# Nixpacks config — used when a platform (Coolify, Railway, ...) builds this
# repo with Nixpacks. Gives the Python provider the start command it can't
# infer for a FastAPI app.
#
# NOTE: this build doesn't install the Playwright browser used for JS
# rendering and the TikTok fallback — those two features just degrade
# gracefully without it. Run `playwright install chromium` in the build
# step if you need them.

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
